<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de contraseñas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h1>Generador de Contraseñas</h1>

        <div class="resultado">
            <input type="text" id="password" readonly>
            <button id="copiar">Copiar</button>
        </div>

        <div class="config">
            <label>
                Longitud:
                <span id="longitudValor">8</span>
            </label>
            <input type="range" id="longitud" min="8" max="20" value="8">

            <label><input type="checkbox" id="mayusculas"> Mayúsculas</label>
            <label><input type="checkbox" id="minusculas"> Minúsculas</label>
            <label><input type="checkbox" id="numeros"> Números</label>
            <label><input type="checkbox" id="simbolos"> Símbolos</label>
        </div>
  
    
    <script src="script.js"></script>
</body>
</html>
